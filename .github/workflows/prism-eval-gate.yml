name: PRISM Eval Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  eval-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRISM_METRICS_ROLE_ARN }}
          aws-region: us-west-2

      - run: sudo apt-get install -y jq bc

      - name: Run eval gate
        id: eval
        run: |
          chmod +x .prism/eval/run-eval-gate.sh
          .prism/eval/run-eval-gate.sh .prism/eval/api-rubric.json \
            origin/${{ github.base_ref }} 2>&1 | tee eval-output.txt
        continue-on-error: true

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('eval-output.txt', 'utf8');
            const status = '${{ steps.eval.outcome }}' === 'success' ? 'PASSED' : 'FAILED';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## PRISM Eval Gate: ${status}\n\`\`\`\n${output}\n\`\`\``
            });

      - name: Fail if eval gate failed
        if: steps.eval.outcome == 'failure'
        run: exit 1
